name: Docker build and simulate deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  IMAGE_NAME: reactjs-quick-starter:latest

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}

      - name: Record image tag
        id: image-tag
        run: echo "tag=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy (simulated)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Simulate deployment
        run: |
          echo "Deploying image ${{ needs.build.outputs.image-tag }} to simulated environment..."
          echo "No registry push performed because this is a simulation."

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Pipeline summary
        run: |
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Build: completed (image built locally during CI job)"
          echo "Deploy: simulated and completed"
          echo "Summary stage finished."
