name: Docker build and simulate deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: reactjs-quick-starter:latest

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    name: Deploy (simulated)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Simulate deployment
        run: |
          echo "Deploying image $IMAGE_NAME to simulated environment..."
          echo "No registry push performed."

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Pipeline summary
        run: |
          echo "Image: $IMAGE_NAME"
          echo "Build: completed"
          echo "Deploy: simulated and completed"
          echo "Summary stage finished."
